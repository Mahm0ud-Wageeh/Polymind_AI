# Polymind — full-stack local/dev orchestration.
# Services: PostgreSQL, Redis, Laravel API (php-fpm + nginx + queue worker), Vite frontend.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-polymind}
      POSTGRES_USER: ${DB_USERNAME:-polymind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-polymind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-polymind}
      DB_USERNAME: ${DB_USERNAME:-polymind}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8000:80"

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
